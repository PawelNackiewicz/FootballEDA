version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: football-eda-postgres
    environment:
      POSTGRES_DB: football_eda
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: football-eda-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: football
      RABBITMQ_DEFAULT_PASS: football123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
