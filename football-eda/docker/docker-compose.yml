version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: football-eda-postgres
    environment:
      POSTGRES_DB: football_eda
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: football-eda-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: football
      RABBITMQ_DEFAULT_PASS: football123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5

  backend:
    build: ../backend
    container_name: football-eda-backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/football_eda
      SPRING_DATASOURCE_USERNAME: football
      SPRING_DATASOURCE_PASSWORD: football123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: football
      SPRING_RABBITMQ_PASSWORD: football123

  frontend:
    build: ../frontend
    container_name: football-eda-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  rabbitmq_data:
